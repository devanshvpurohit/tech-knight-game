<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Knight - Battle Royale Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #game-container {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        canvas {
            border-radius: 10px;
            display: block;
        }
        
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        #title {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ff41, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #prize-info {
            background: rgba(0, 255, 65, 0.2);
            border: 2px solid #00ff41;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-size: 0.9em;
            z-index: 10;
        }
        
        .key {
            background: #00ff41;
            color: black;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: bold;
            margin: 0 3px;
        }
        
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            z-index: 10;
            min-width: 200px;
        }
        
        .stat-item {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-label {
            color: #00ff41;
            font-weight: bold;
        }
        
        .health-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #00ff41);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div id="title">⚔️ TECH KNIGHT ⚔️</div>
        <div id="prize-info">
            🏆 Prize Pool: ₹60,000 | Entry: ₹349
        </div>
    </div>
    
    <div id="stats">
        <div class="stat-item">
            <span class="stat-label">HEALTH</span>
            <span id="health-value">100</span>
        </div>
        <div class="health-bar">
            <div class="health-fill" id="health-fill" style="width: 100%"></div>
        </div>
        <div class="stat-item">
            <span class="stat-label">SCORE</span>
            <span id="score-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">ENEMIES</span>
            <span id="enemies-value">0</span>
        </div>
    </div>
    
    <div id="game-container"></div>
    
    <div id="controls">
        <span class="key">WASD</span> Move | 
        <span class="key">SPACE</span> Attack | 
        <span class="key">SHIFT</span> Sprint | 
        <span class="key">Q</span> Shield
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
